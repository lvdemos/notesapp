<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0C10">
<title>단어장 · Word Log</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <h1>단어장</h1>
      <span class="brand-sub">word log</span>
    </div>
    <div class="count-badge" id="countBadge">0</div>
  </header>

  <section class="add-panel">
    <div class="field-row">
      <input id="phraseInput" type="text" placeholder="type a phrase — korean or english" autocomplete="off" spellcheck="false">
      <button id="addBtn" class="btn-primary" aria-label="add phrase">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="field-row secondary" id="manualRow" hidden>
      <input id="meaningInput" type="text" placeholder="english meaning">
      <input id="koreanInput" type="text" placeholder="한국어" class="ko">
      <input id="romInput" type="text" placeholder="romanization">
    </div>
    <div class="hint" id="statusHint">enter a word or phrase and hit add</div>
  </section>

  <nav class="chips" id="categoryChips"></nav>

  <div class="search-row">
    <svg viewBox="0 0 24 24" width="16" height="16" class="search-icon"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <input id="searchInput" type="text" placeholder="search your log">
  </div>

  <main class="log" id="logList">
    <div class="empty-state" id="emptyState">
      <p>nothing logged yet</p>
      <span>whatever you learn goes here</span>
    </div>
  </main>

</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
